name: Build CouchFlow APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pil

      - name: Generate visual assets from logo.png
        run: |
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import os
          import numpy as np

          SRC = 'icon/logo.png'
          if not os.path.exists(SRC):
              raise SystemExit(f"ERROR: {SRC} not found. Upload the logo sheet to icon/logo.png")

          RES = 'app/src/main/res'
          # Panel color sampled from the logo's dark background — use this
          # as app bg so the lockup sits flush without a visible rectangle.
          PANEL_COLOR = (15, 22, 38, 255)  # #0F1626

          im = Image.open(SRC).convert('RGB')
          w, h = im.size
          print(f"source: {w}x{h}")

          # The dark lockup panel on the source sheet is approximately at
          # x=[800,1500] y=[640,860] (bottom-right of the 1536x1024 sheet).
          # Scale to actual source dimensions in case logo.png was resized.
          sx = w / 1536
          sy = h / 1024
          panel = im.crop((int(800*sx), int(640*sy), int(1500*sx), int(860*sy)))
          panel_arr = np.array(panel)

          # Find tight content bbox by looking for pixels that differ from
          # the panel background color. This preserves the </> glyph which
          # would be lost by a naive "black = transparent" approach.
          ref = np.array([15, 22, 38])
          diff = np.abs(panel_arr.astype(int) - ref).sum(axis=2)
          content = diff > 40
          ys, xs = np.where(content)
          if len(xs) == 0:
              raise SystemExit("Could not locate lockup content in logo.png")
          x1, x2 = xs.min(), xs.max()
          y1, y2 = ys.min(), ys.max()
          pad = 8
          lockup = panel.crop((max(0, x1 - pad),
                               max(0, y1 - pad),
                               min(panel.width,  x2 + pad),
                               min(panel.height, y2 + pad)))
          print(f"extracted lockup: {lockup.size}")

          # ========== Wordmark lockup at 5 densities ==========
          # Target: ~40dp tall. 40dp at each density:
          wm_densities = {
              'mdpi':     40,
              'hdpi':     60,
              'xhdpi':    80,
              'xxhdpi':  120,
              'xxxhdpi': 160,
          }
          for name, hh in wm_densities.items():
              ww = int(lockup.width * (hh / lockup.height))
              d = f'{RES}/drawable-{name}'
              os.makedirs(d, exist_ok=True)
              lockup.resize((ww, hh), Image.LANCZOS).save(f'{d}/logo_wordmark.png')
              print(f"Wordmark {name}: {ww}x{hh}")

          # ========== Launcher icon: dark tile + couch mark ==========
          # Extract just the couch mark (no text) from the top-left logo.
          # Source: full color logo at x=[200,615] y=[245,430] (roughly)
          mark = im.crop((int(200*sx), int(245*sy), int(615*sx), int(430*sy)))
          # Make white background transparent
          mark_rgba = mark.convert('RGBA')
          mpix = mark_rgba.load()
          for py in range(mark_rgba.height):
              for px in range(mark_rgba.width):
                  r, g, b, a = mpix[px, py]
                  if r > 240 and g > 240 and b > 240:
                      mpix[px, py] = (0, 0, 0, 0)

          densities = {
              'mdpi':    48,
              'hdpi':    72,
              'xhdpi':   96,
              'xxhdpi':  144,
              'xxxhdpi': 192,
          }

          def make_icon(size, circular=False):
              bg = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              mask = Image.new('L', (size, size), 0)
              d = ImageDraw.Draw(mask)
              if circular:
                  d.ellipse((0, 0, size-1, size-1), fill=255)
              else:
                  d.rounded_rectangle((0, 0, size-1, size-1),
                                      radius=int(size * 0.22), fill=255)
              tile = Image.new('RGBA', (size, size), PANEL_COLOR)
              bg.paste(tile, (0, 0), mask)
              mw = int(size * (0.72 if circular else 0.80))
              mh = int(mw * (mark_rgba.height / mark_rgba.width))
              mr = mark_rgba.resize((mw, mh), Image.LANCZOS)
              bg.paste(mr, ((size - mw) // 2, (size - mh) // 2), mr)
              return bg

          for name, size in densities.items():
              d = f'{RES}/mipmap-{name}'
              os.makedirs(d, exist_ok=True)
              make_icon(size, False).save(f'{d}/ic_launcher.png')
              make_icon(size, True ).save(f'{d}/ic_launcher_round.png')
              print(f"Launcher {name}: {size}x{size}")

          # Adaptive icon foreground (API 26+)
          fg_size = 432
          fg_mw = int(fg_size * 0.70)
          fg_mh = int(fg_mw * (mark_rgba.height / mark_rgba.width))
          fg = Image.new('RGBA', (fg_size, fg_size), (0, 0, 0, 0))
          mr = mark_rgba.resize((fg_mw, fg_mh), Image.LANCZOS)
          fg.paste(mr, ((fg_size - fg_mw) // 2, (fg_size - fg_mh) // 2), mr)
          fg.save(f'{RES}/mipmap-xxxhdpi/ic_launcher_foreground.png')

          # Adaptive icon background (solid panel color)
          os.makedirs(f'{RES}/drawable', exist_ok=True)
          with open(f'{RES}/drawable/ic_launcher_background.xml', 'w') as f:
              f.write('<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:pathData="M0,0h108v108h-108z" android:fillColor="#0F1626" /></vector>')

          # Adaptive icon wrapper XML
          os.makedirs(f'{RES}/mipmap-anydpi-v26', exist_ok=True)
          adaptive = '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@drawable/ic_launcher_background" /><foreground android:drawable="@mipmap/ic_launcher_foreground" /></adaptive-icon>'
          with open(f'{RES}/mipmap-anydpi-v26/ic_launcher.xml', 'w') as f:
              f.write(adaptive)
          with open(f'{RES}/mipmap-anydpi-v26/ic_launcher_round.xml', 'w') as f:
              f.write(adaptive)

          # Remove stale foreground vector if it exists (would shadow PNG)
          stale = f'{RES}/drawable/ic_launcher_foreground.xml'
          if os.path.exists(stale):
              os.remove(stale)

          print("All visual assets generated.")
          PYEOF

      - name: Install Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=CouchFlow, OU=CouchFlow, O=CouchFlow, L=Couch, S=LR, C=US"

      - name: Build Release APK
        run: |
          gradle wrapper --gradle-version=8.2
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/CouchFlow-release.apk CouchFlow-${{ github.sha }}.apk 2>/dev/null || \
          cp app/build/outputs/apk/release/app-release.apk       CouchFlow-${{ github.sha }}.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: CouchFlow-release
          path: CouchFlow-*.apk
          retention-days: 30
name: Build CouchFlow APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pil python3-numpy

      - name: Generate visual assets
        run: python3 .github/scripts/generate_assets.py

      - name: Install Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=CouchFlow, OU=CouchFlow, O=CouchFlow, L=Couch, S=LR, C=US"

      - name: Build Release APK
        run: |
          gradle wrapper --gradle-version=8.2
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/CouchFlow-release.apk CouchFlow-${{ github.sha }}.apk 2>/dev/null || \
          cp app/build/outputs/apk/release/app-release.apk       CouchFlow-${{ github.sha }}.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: CouchFlow-release
          path: CouchFlow-*.apk
          retention-days: 30
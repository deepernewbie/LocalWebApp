name: Build CouchFlow APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install ImageMagick for icon generation
        run: sudo apt-get install -y imagemagick

      - name: Generate launcher icons from logo.png
        run: |
          # The repo has a single source logo at icon/logo.png.
          # This step generates all the Android density-specific PNGs
          # that the launcher needs, so we don't have to commit 10
          # icon files — just the source logo.
          set -e
          SRC=icon/logo.png
          if [ ! -f "$SRC" ]; then
            echo "ERROR: icon/logo.png not found in repo root"
            exit 1
          fi
          RES=app/src/main/res

          # Standard Android mipmap sizes
          declare -A SIZES=(
            [mdpi]=48
            [hdpi]=72
            [xhdpi]=96
            [xxhdpi]=144
            [xxxhdpi]=192
          )

          for DENSITY in "${!SIZES[@]}"; do
            SIZE=${SIZES[$DENSITY]}
            DIR=$RES/mipmap-$DENSITY
            mkdir -p "$DIR"
            # Square icon for standard launcher
            convert "$SRC" -resize ${SIZE}x${SIZE} "$DIR/ic_launcher.png"
            # Round icon: apply circular mask
            convert "$SRC" -resize ${SIZE}x${SIZE} \
              \( +clone -threshold -1 -negate -fill white \
                 -draw "circle $((SIZE/2-1)),$((SIZE/2-1)) $((SIZE/2-1)),0" \) \
              -alpha off -compose copy_opacity -composite \
              "$DIR/ic_launcher_round.png"
            echo "Generated $DENSITY (${SIZE}x${SIZE})"
          done

          # Adaptive icon foreground (API 26+): logo sized to ~66% of 432px
          mkdir -p $RES/mipmap-xxxhdpi
          convert "$SRC" -resize 264x264 \
            -background none -gravity center -extent 432x432 \
            $RES/mipmap-xxxhdpi/ic_launcher_foreground.png

          # Adaptive icon background — solid dark color
          mkdir -p $RES/drawable
          cat > $RES/drawable/ic_launcher_background.xml << 'BG'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:pathData="M0,0h108v108h-108z" android:fillColor="#0A0A0F" />
          </vector>
          BG

          # Adaptive icon XML (API 26+)
          mkdir -p $RES/mipmap-anydpi-v26
          cat > $RES/mipmap-anydpi-v26/ic_launcher.xml << 'ADA'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@mipmap/ic_launcher_foreground" />
          </adaptive-icon>
          ADA
          cp $RES/mipmap-anydpi-v26/ic_launcher.xml \
             $RES/mipmap-anydpi-v26/ic_launcher_round.xml

          echo "Icon generation complete"
          ls -la $RES/mipmap-*/ $RES/drawable/

      - name: Install Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=CouchFlow, OU=CouchFlow, O=CouchFlow, L=Couch, S=LR, C=US"

      - name: Build Release APK
        run: |
          gradle wrapper --gradle-version=8.2
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/CouchFlow-release.apk CouchFlow-${{ github.sha }}.apk 2>/dev/null || \
          cp app/build/outputs/apk/release/app-release.apk       CouchFlow-${{ github.sha }}.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: CouchFlow-release
          path: CouchFlow-*.apk
          retention-days: 30